<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flower Design Collection</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* CONTENT */
.content {
    padding: 15px;
    text-align: center;
}

.content h3 {
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 8px 15px;
    background: #27ae60;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
<h1>Flower Design Collection 🌸</h1>

<div class="grid">

<!-- Flora 1 -->

<div class="card">
    <img class="slider"
         data-images='[
         "Flora-1/flower-design-3d-relief-digital-effect1.png",
         "Flora-1/flower-design-3d-relief-digital-effect2.png",
         "Flora-1/flower-design-3d-relief-digital-effect3.png",
         "Flora-1/flower-design-3d-relief-digital-effect4.png"
         ]'
         src="Flora-1/flower-design-3d-relief-digital-effect1.png">

```
<div class="content">
    <h3>Flora 1</h3>
    <p>30 STL Flower Design Bundle</p>
    <a href="Flora-1/" class="btn">View More</a>
</div>
```

</div>

<!-- Flora 2 -->

<div class="card">
    <img class="slider"
         data-images='[
         "Flora-2/flower-design-3d-relief-digital-effect1.png",
         "Flora-2/flower-design-3d-relief-digital-effect2.png",
         "Flora-2/flower-design-3d-relief-digital-effect3.png",
         "Flora-2/flower-design-3d-relief-digital-effect4.png"
         ]'
         src="Flora-2/flower-design-3d-relief-digital-effect1.png">

```
<div class="content">
    <h3>Flora 2</h3>
    <p>30 STL Flower Design Bundle</p>
    <a href="Flora-2/" class="btn">View More</a>
</div>
```

</div>

</div>
</div>

<script>
// Select all sliders
let sliders = document.querySelectorAll(".slider");

// Loop each slider
sliders.forEach((slider) => {
    let images = JSON.parse(slider.getAttribute("data-images"));
    let index = 0;

    setInterval(() => {
        index = (index + 1) % images.length;
        slider.src = images[index];
    }, 1500);
});
</script>

</body>
</html>
