<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f7f7f7;
}

.container {
    padding: 10px;
}

h1 {
    text-align: center;
    font-size: 18px;
    margin-bottom: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* IMAGE BOX */
.img-box {
    position: relative;
    line-height: 0; /* 🔥 removes extra gap */
}

.img-box img {
    width: 100%;
    height: 180px;
    object-fit: contain; /* 🔥 FIX: no crop */
    background: #fff;
}

/* BADGE */
.badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: #ff4757;
    color: #fff;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 10px;
}

/* CONTENT */
.content {
    padding: 6px 8px; /* 🔥 reduced space */
    text-align: center;
}

.content h3 {
    margin: 2px 0;
    font-size: 14px;
}

.desc {
    font-size: 11px;
    color: #666;
    margin: 2px 0;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 5px;
    padding: 6px 12px;
    background: #27ae60;
    color: #fff;
    text-decoration: none;
    border-radius: 15px;
    font-size: 11px;
}
</style>
