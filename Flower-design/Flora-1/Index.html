<!DOCTYPE html>

  <!-- Structured Data for Google -->
  <script type="application/ld+json">

  <link rel="stylesheet" href="../../style.css" />
  <style>
    body { font-family:'Poppins',sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .container { max-width:1200px; margin:auto; padding:40px 20px; }
    h1 { text-align:center; font-size:2.5rem; margin-bottom:10px; }
    .subheading { text-align:center; color:#666; margin-bottom:40px; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
    .gallery img { width:100%; cursor:pointer; border-radius:10px; transition: transform 0.3s; }
    .gallery img:hover { transform:scale(1.05); }
    #zoomModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:9999; cursor:pointer; }
    #zoomModal img { max-width:90%; max-height:90%; border-radius:10px; }
    .price { text-align:center; font-size:1.5rem; font-weight:600; margin-top:20px; color:#7f6000; }
    .back-link { display:block; text-align:center; margin-top:40px; font-size:1rem; text-decoration:none; color:#444; }
    .back-link:hover { color:#7f6000; }
    h2 { font-size:1.2rem; text-align:center; color:#333; margin:8px 0; }
  </style>
</head>
<body>

  <!-- Header placeholder -->
  <div id="header-placeholder"></div>

  <div class="container">
    <h1>Flora 1 Combo Pack</h1>
    <p class="subheading">30 beautiful 3D flower designs for CNC carving by <strong>Digital Effect</strong>. PNG images ready for your creative projects.</p>

    <div class="gallery">
      <!-- Example of first 3 images; replace with all 30 -->
      <div>
        <img src="flower-design-3d-relief-digital-effect1.png" alt="Flora 1 Design 1 - 3D CNC flower carving" loading="lazy" onclick="openZoom(this)">
        <h2>Flora 1 - Design 1</h2>
      </div>
      <div>
        <img src="flower-design-3d-relief-digital-effect2.png" alt="Flora 1 Design 2 - 3D CNC flower carving" loading="lazy" onclick="openZoom(this)">
        <h2>Flora 1 - Design 2</h2>
      </div>
      <div>
        <img src="flower-design-3d-relief-digital-effect3.png" alt="Flora 1 Design 3 - 3D CNC flower carving" loading="lazy" onclick="openZoom(this)">
        <h2>Flora 1 - Design 3</h2>
      </div>
      <!-- Continue adding all 30 designs here in the same structure -->
    </div>

    <div class="price">Combo Pack Price: ₹200</div>

    <a href="../index.html" class="back-link">← Back to Flower Designs</a>
  </div>

  <!-- Zoom Modal -->
  <div id="zoomModal" onclick="closeZoom()">
    <img id="zoomImg" src="" alt="Zoomed flower design" />
  </div>

  <!-- Footer placeholder -->
  <div id="footer-placeholder"></div>

  <script>
    // Zoom Modal
    function openZoom(img) {
      document.getElementById('zoomImg').src = img.src;
      document.getElementById('zoomModal').style.display = 'flex';
    }
    function closeZoom() {
      document.getElementById('zoomModal').style.display = 'none';
    }

    // Fetch header
    fetch("../../header.html")
      .then(res => res.text())
      .then(data => document.getElementById("header-placeholder").innerHTML = data)
      .catch(err => console.error("Header not found"));

    // Fetch footer
    fetch("../../footer.html")
      .then(res => res.text())
      .then(data => document.getElementById("footer-placeholder").innerHTML = data)
      .catch(err => console.error("Footer not found"));
  </script>

</body>
</html>
