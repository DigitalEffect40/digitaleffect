<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flower Designs</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

.container {
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 30px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* SLIDER */
.slider {
    position: relative;
    width: 100%;
    height: 220px;
    overflow: hidden;
}

.slides {
    display: flex;
    width: 400%;
    animation: slide 12s infinite;
}

.slides img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* ANIMATION */
@keyframes slide {
    0% {transform: translateX(0);}
    25% {transform: translateX(0);}
    30% {transform: translateX(-100%);}
    50% {transform: translateX(-100%);}
    55% {transform: translateX(-200%);}
    75% {transform: translateX(-200%);}
    80% {transform: translateX(-300%);}
    100% {transform: translateX(-300%);}
}

/* CONTENT */
.content {
    padding: 15px;
    text-align: center;
}

.content h3 {
    margin: 10px 0;
}

.btn {
    display: inline-block;
    padding: 8px 15px;
    background: #27ae60;
    color: #fff;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">
<h1>Flower Design Collection 🌸</h1>

<div class="grid">

<!-- Flora 1 -->

<div class="card">
    <div class="slider">
        <div class="slides">
            <img >
            <img src="Flora-1/images/2.jpg">
            <img src="Flora-1/images/3.jpg">
            <img src="Flora-1/images/4.jpg">
        </div>
    </div>
    <div class="content">
        <h3>Flora 1</h3>
        <p>30 STL Flower Design Bundle</p>
        <a href="Flora-1/" class="btn">View More</a>
    </div>
</div>

<!-- Flora 2 -->

<div class="card">
    <div class="slider">
        <div class="slides">
            <img src="Flora-2/images/1.jpg">
            <img src="Flora-2/images/2.jpg">
            <img src="Flora-2/images/3.jpg">
            <img src="Flora-2/images/4.jpg">
        </div>
    </div>
    <div class="content">
        <h3>Flora 2</h3>
        <p>30 STL Flower Design Bundle</p>
        <a href="Flora-2/" class="btn">View More</a>
    </div>
</div>

</div>
</div>

</body>
</html>
